  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (saved === 'dark' || (!saved && preferDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
