<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход и регистрация — MangaDesk</title>
  <meta name="description" content="Вход и регистрация в MangaDesk" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (saved === 'dark' || (!saved && preferDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body class="page-auth">
  <div class="auth-split">
    <aside class="auth-split-left" aria-hidden="true">
      <video class="auth-split-video" autoplay muted loop playsinline preload="auto">
        <source src="src/assets/auth.mp4" type="video/mp4">
      </video>
    </aside>

    <div class="auth-split-right">
      <button type="button" id="theme-toggle" class="icon-btn auth-theme-btn" aria-label="Сменить тему">
        <i data-lucide="sun" class="sun-icon"></i>
        <i data-lucide="moon" class="moon-icon"></i>
      </button>

      <div class="auth-panel-wrap">
        <div class="auth-panel">
          <a href="index.html" class="logo-group auth-panel-logo" aria-label="MangaDesk — на главную">
            <div class="logo-icon">
              <img src="/logo.svg" alt="" class="main-logo" width="20" height="20">
            </div>
            <span class="logo-text">MangaDesk</span>
          </a>

          <p class="auth-welcome">Добро пожаловать!</p>

          <div class="auth-tabs" role="tablist" aria-label="Режим входа">
            <button type="button" class="auth-tab is-active" role="tab" aria-selected="true" aria-controls="auth-panel-login"
              id="auth-tab-login" data-auth-tab="login">Вход</button>
            <button type="button" class="auth-tab" role="tab" aria-selected="false" aria-controls="auth-panel-register"
              id="auth-tab-register" data-auth-tab="register">Регистрация</button>
          </div>

          <div class="auth-tab-panels">
            <div class="auth-tab-panel is-active" id="auth-panel-login" role="tabpanel" aria-labelledby="auth-tab-login"
              data-auth-panel="login">
              <div class="auth-oauth">
                <a href="#" class="auth-oauth-btn auth-oauth-btn--google">
                  <span class="auth-oauth-icon auth-oauth-icon--google" aria-hidden="true">
                    <img src="src/assets/Google.svg" alt="" width="18" height="18" decoding="async">
                  </span>
                  <span>Войти через Google</span>
                </a>
                <a href="#" class="auth-oauth-btn auth-oauth-btn--vk">
                  <span class="auth-oauth-icon auth-oauth-icon--vk" aria-hidden="true">
                    <img src="src/assets/VK.svg" alt="" width="18" height="18" decoding="async">
                  </span>
                  <span>Войти через VK</span>
                </a>
              </div>
              <p class="auth-switch">
                Ещё нет аккаунта?
                <button type="button" class="auth-switch-btn" data-auth-switch="register">Зарегистрируйтесь</button>
              </p>
            </div>

            <div class="auth-tab-panel" id="auth-panel-register" role="tabpanel" aria-labelledby="auth-tab-register" hidden
              data-auth-panel="register">
              <div class="auth-oauth">
                <a href="#" class="auth-oauth-btn auth-oauth-btn--google">
                  <span class="auth-oauth-icon auth-oauth-icon--google" aria-hidden="true">
                    <img src="src/assets/Google.svg" alt="" width="18" height="18" decoding="async">
                  </span>
                  <span>Продолжить с Google</span>
                </a>
                <a href="#" class="auth-oauth-btn auth-oauth-btn--vk">
                  <span class="auth-oauth-icon auth-oauth-icon--vk" aria-hidden="true">
                    <img src="src/assets/VK.svg" alt="" width="18" height="18" decoding="async">
                  </span>
                  <span>Продолжить с VK</span>
                </a>
              </div>
              <p class="auth-switch">
                Уже зарегистрированы?
                <button type="button" class="auth-switch-btn" data-auth-switch="login">Войдите</button>
              </p>
            </div>
          </div>

          <p class="auth-back-wrap">
            <a href="index.html" class="auth-link-back">← На главную</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@0.539.0/dist/umd/lucide.min.js"></script>
  <script type="module" src="src/js/scripts.js"></script>
  <script>
    (function () {
      var v = document.querySelector('.auth-split-video');
      if (v && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        v.removeAttribute('autoplay');
        v.pause();
      }
    })();
  </script>
  <script>
    (function () {
      var root = document.querySelector('.auth-split');
      if (!root) return;

      function showTab(name) {
        document.querySelectorAll('.auth-tab').forEach(function (t) {
          var on = t.getAttribute('data-auth-tab') === name;
          t.classList.toggle('is-active', on);
          t.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        document.querySelectorAll('[data-auth-panel]').forEach(function (p) {
          var match = p.getAttribute('data-auth-panel') === name;
          p.hidden = !match;
          p.classList.toggle('is-active', match);
        });
      }

      document.querySelectorAll('.auth-tab').forEach(function (tab) {
        tab.addEventListener('click', function () {
          showTab(tab.getAttribute('data-auth-tab'));
        });
      });
      document.querySelectorAll('.auth-switch-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          showTab(btn.getAttribute('data-auth-switch'));
        });
      });
    })();
  </script>
</body>

</html>
