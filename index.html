<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaDesk</title>
  <meta name="description" content="MangaDesk — инструмент для автоматизации перевода." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (saved === 'dark' || (!saved && preferDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body>
  <load src="parts/header-index.html" />

  <main class="container">
    <section class="hero">
      <div class="page-content">
        <div class="hero-badge">
          <span class="hero-dot" aria-hidden="true"></span>
          <span class="hero-badge-text">Новое поколение перевода</span>
        </div>

        <h1 class="hero-title">
          Переводите главы за секунды с сохранением <span class="text-gradient">слоёв в PSD</span>
        </h1>

        <p class="hero-subtitle">
          Мы экономим ваше время, чтобы вы занимались творчеством, а не рутиной
        </p>

        <div class="hero-actions">
          <a class="btn-primary hero-cta" href="auth.html" role="button">Начать работу</a>

          <button class="btn-secondary open-modal-btn" type="button" data-modal="auth-modal">
            Открыть демо-модалку
          </button>
        </div>
      </div>
    </section>
  </main>

  <load src="parts/footer.html" />
  <load src="parts/modals.html" />

  <script src="https://unpkg.com/lucide@0.539.0/dist/umd/lucide.min.js"></script>
  <script type="module" src="src/js/scripts.js"></script>
</body>

</html>
