<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaDesk — Статьи</title>
  <meta name="description" content="MangaDesk — Статьи и мануалы" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="src/css/pages/articles.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && preferDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body>
  <load src="parts/header-simple.html" />

  <main class="articles-page" id="articles-page">
    <div class="page-content">
      <div class="articles-head section-head">
        <h1 class="section-title">Статьи</h1>
        <p class="section-subtitle">Мануалы по переводу, клину и тайпу</p>
      </div>
      <p class="articles-placeholder">Здесь появится список статей.</p>
    </div>
  </main>

  <load src="parts/footer.html" />
  <load src="parts/modals.html" />
  <script src="https://unpkg.com/lucide@0.539.0/dist/umd/lucide.min.js"></script>
  <script type="module" src="src/js/scripts.js"></script>
</body>

</html>
