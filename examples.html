<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaDesk — Примеры работ</title>
  <meta name="description" content="MangaDesk — Примеры работ" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="icon" type="image/svg+xml" href="public/logo.svg">
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && preferDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body>
  <load src="parts/header-simple.html" />

  <main class="examples-page" id="examples-page">
    <div class="page-content">
      <div class="examples-head section-head">
        <h1 class="section-title">Примеры работ</h1>
        <p class="section-subtitle">Демонстрация возможностей сервиса по категориям</p>
      </div>

      <div id="examples-root" class="examples-categories" aria-label="Примеры по категориям"></div>
    </div>
  </main>
  <load src="parts/footer.html" />
  <load src="parts/modals.html" />
  <script src="https://unpkg.com/lucide@0.539.0/dist/umd/lucide.min.js"></script>
  <script type="module" src="src/js/scripts.js"></script>
</body>

</html>
